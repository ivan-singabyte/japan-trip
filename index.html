<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1f1d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kansai Trip">
<title>Kansai Family Trip · June 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f0e7;
    --paper-2:#fffdf8;
    --ink:#211f1b;
    --ink-soft:#5a554c;
    --ink-faint:#938c7e;
    --line:#e2dccf;
    --line-strong:#d2cab8;
    --accent:#c2512c;       /* persimmon */
    --accent-soft:#f3e3da;
    --osaka:#c2512c;        /* persimmon */
    --kobe:#3f6f6e;         /* arima teal */
    --kyoto:#6a6a31;        /* matcha */
    --nara:#a9762a;         /* deer ochre */
    --shadow:0 1px 2px rgba(40,33,20,.05),0 8px 24px rgba(40,33,20,.06);
    --shadow-lg:0 2px 6px rgba(40,33,20,.08),0 20px 50px rgba(40,33,20,.12);
    --nav-h:64px;
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(rgba(120,108,84,.05) 1px,transparent 1px);
    background-size:4px 4px;
  }
  .wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 18px}

  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:30;
    background:rgba(244,240,231,.82);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .top-inner{max-width:640px;margin:0 auto;padding:13px 18px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;flex-direction:column;line-height:1.1}
  .brand .kanji{font-family:'Fraunces',serif;font-weight:600;font-size:20px;letter-spacing:-.01em}
  .brand .sub{font-size:11px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .status{
    text-align:right;font-size:11px;font-weight:700;line-height:1.25;
    padding:6px 10px;border-radius:999px;background:var(--paper-2);
    border:1px solid var(--line-strong);color:var(--ink-soft);white-space:nowrap;
  }
  .status b{color:var(--accent);display:block;font-size:13px}

  /* ---------- Sections / tabs ---------- */
  main{padding-top:18px;min-height:60vh}
  .view{display:none;animation:fade .35s ease both}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .view-title{font-family:'Fraunces',serif;font-weight:600;font-size:27px;letter-spacing:-.02em;margin-bottom:2px}
  .view-sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:18px}

  /* ---------- Day cards ---------- */
  .day-card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);margin-bottom:13px;overflow:hidden;
    position:relative;cursor:pointer;transition:transform .15s ease,box-shadow .2s ease;
  }
  .day-card:active{transform:scale(.992)}
  .day-card.today{box-shadow:var(--shadow-lg);border-color:var(--accent)}
  .day-card .stripe{position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c)}
  .day-head{display:flex;align-items:center;gap:14px;padding:15px 16px 15px 20px}
  .daynum{
    flex:0 0 auto;width:46px;height:46px;border-radius:12px;
    background:var(--c-soft,var(--accent-soft));color:var(--c);
    display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
  }
  .daynum .d{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.8}
  .daynum .n{font-family:'Fraunces',serif;font-weight:600;font-size:21px}
  .day-meta{flex:1;min-width:0}
  .day-meta .dt{font-size:11.5px;color:var(--ink-faint);font-weight:600;letter-spacing:.02em}
  .day-meta .ti{font-family:'Fraunces',serif;font-size:17.5px;font-weight:500;letter-spacing:-.01em;margin:1px 0 3px}
  .day-meta .pl{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--c)}
  .pl .dot{width:7px;height:7px;border-radius:50%;background:var(--c)}
  .chev{flex:0 0 auto;color:var(--ink-faint);transition:transform .25s ease}
  .day-card.open .chev{transform:rotate(90deg)}
  .today-flag{position:absolute;top:0;right:0;background:var(--accent);color:#fff;font-size:9.5px;font-weight:700;letter-spacing:.07em;padding:3px 9px;border-bottom-left-radius:10px;text-transform:uppercase}

  .day-body{display:none;padding:0 16px 4px 20px}
  .day-card.open .day-body{display:block;animation:fade .3s ease both}

  .block{border-top:1px solid var(--line);padding:14px 0}
  .block:first-child{border-top:none}
  .block-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);margin-bottom:9px}
  .block-h .ic{font-size:13px}

  .li{display:flex;gap:9px;font-size:14px;color:var(--ink-soft);margin-bottom:7px;line-height:1.45}
  .li:last-child{margin-bottom:0}
  .li .bullet{flex:0 0 auto;width:5px;height:5px;border-radius:50%;background:var(--line-strong);margin-top:8px}
  .li b{color:var(--ink);font-weight:600}

  /* schedule rows */
  .sched{display:flex;gap:11px;margin-bottom:9px}
  .sched:last-child{margin-bottom:0}
  .sched .tm{flex:0 0 64px;font-size:12px;font-weight:700;color:var(--c);font-variant-numeric:tabular-nums;padding-top:1px}
  .sched .ac{font-size:13.5px;color:var(--ink-soft);line-height:1.4;border-left:1px solid var(--line);padding-left:11px}
  .sched .ac b{color:var(--ink);font-weight:600}

  /* options */
  .opt{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
  .opt:last-child{margin-bottom:0}
  .opt.rec{border-color:var(--c);background:linear-gradient(0deg,var(--c-soft,var(--accent-soft)),var(--paper-2))}
  .opt-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .opt-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#fff;background:var(--c);padding:2px 7px;border-radius:6px}
  .opt-name{font-weight:600;font-size:14px;color:var(--ink)}
  .opt-rec-badge{margin-left:auto;font-size:10px;font-weight:700;color:var(--c);text-transform:uppercase;letter-spacing:.04em}
  .opt .li{font-size:13px;margin-bottom:5px}
  .opt .li .bullet{background:var(--c);opacity:.5}

  .callout{display:flex;gap:9px;background:var(--accent-soft);border-radius:10px;padding:10px 12px;font-size:13px;color:#7a3417;line-height:1.45;margin-top:4px}
  .callout .ic{flex:0 0 auto}
  .callout b{color:#612810}

  /* ---------- Reference ---------- */
  .acc{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
  .acc>summary{list-style:none;cursor:pointer;padding:15px 16px;display:flex;align-items:center;gap:11px;font-weight:600;font-size:15.5px}
  .acc>summary::-webkit-details-marker{display:none}
  .acc>summary .ic{font-size:17px;width:24px;text-align:center}
  .acc>summary .arr{margin-left:auto;color:var(--ink-faint);transition:transform .25s}
  .acc[open]>summary{border-bottom:1px solid var(--line)}
  .acc[open]>summary .arr{transform:rotate(180deg)}
  .acc .inner{padding:14px 16px 16px}

  .row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
  .row:first-child{border-top:none}
  .row .l{font-size:13.5px}
  .row .l b{display:block;font-weight:600;color:var(--ink);margin-bottom:1px}
  .row .l span{color:var(--ink-faint);font-size:12px}
  .row .r{text-align:right;font-size:13px;font-weight:600;color:var(--ink-soft);white-space:nowrap;flex:0 0 auto;font-variant-numeric:tabular-nums}
  .row .r small{display:block;font-weight:500;color:var(--ink-faint);font-size:11px}

  .stay{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .stay:first-child{border-top:none}
  .stay .bar{flex:0 0 4px;border-radius:3px;background:var(--c)}
  .stay .info{flex:1}
  .stay .dates{font-size:11.5px;font-weight:700;color:var(--c);text-transform:uppercase;letter-spacing:.03em}
  .stay .nm{font-weight:600;font-size:14.5px;margin:2px 0 2px}
  .stay .det{font-size:12.5px;color:var(--ink-soft);line-height:1.45}
  .stay .det code{background:var(--paper);padding:1px 6px;border-radius:5px;font-size:11.5px;border:1px solid var(--line-strong);font-family:ui-monospace,monospace}

  .task{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line);cursor:pointer}
  .task:first-child{border-top:none}
  .task .box{flex:0 0 auto;width:21px;height:21px;border-radius:6px;border:2px solid var(--line-strong);margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s;color:#fff;font-size:13px;font-weight:700}
  .task.done .box{background:var(--accent);border-color:var(--accent)}
  .task .tx{font-size:13.5px;color:var(--ink-soft);line-height:1.45;transition:.15s}
  .task .tx b{color:var(--ink);font-weight:600}
  .task.done .tx{opacity:.5;text-decoration:line-through}

  .pill-list{display:flex;flex-wrap:wrap;gap:7px}
  .pill{font-size:12.5px;background:var(--paper);border:1px solid var(--line-strong);border-radius:8px;padding:6px 10px;color:var(--ink-soft)}

  /* ---------- Food ---------- */
  .filters{position:sticky;top:calc(env(safe-area-inset-top) + 56px);z-index:20;display:flex;gap:7px;overflow-x:auto;padding:4px 0 12px;margin:0 -18px;padding-left:18px;padding-right:18px;-ms-overflow-style:none;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fbtn{flex:0 0 auto;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;background:var(--paper-2);border:1px solid var(--line-strong);color:var(--ink-soft);cursor:pointer;transition:.15s;white-space:nowrap}
  .fbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .area-h{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--c);margin:18px 0 9px;display:flex;align-items:center;gap:8px}
  .area-h .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}
  .area-h:first-child{margin-top:2px}
  .place{background:var(--paper-2);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow)}
  .place-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .place .nm{font-weight:600;font-size:14.5px;color:var(--ink);line-height:1.25}
  .place .pr{font-size:12.5px;font-weight:700;color:var(--c);white-space:nowrap;flex:0 0 auto;font-variant-numeric:tabular-nums}
  .place .ty{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);margin-top:5px}
  .place .ds{font-size:12.5px;color:var(--ink-soft);line-height:1.45;margin-top:5px}
  .place .mt{font-size:11.5px;color:var(--ink-faint);margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 12px}
  .place .mt span b{color:var(--ink-soft);font-weight:600}
  .maplink{display:inline-flex;align-items:center;gap:4px;color:var(--c,var(--accent));font-weight:700;text-decoration:none}
  .maplink:active{opacity:.6}
  .maplink svg{width:13px;height:13px}
  .stay .map{display:inline-flex;align-items:center;gap:4px;margin-top:7px;font-size:12px;font-weight:700;color:var(--c);text-decoration:none;background:var(--paper);border:1px solid var(--line-strong);padding:4px 9px;border-radius:8px}
  .stay .map svg{width:13px;height:13px}
  .empty{text-align:center;color:var(--ink-faint);font-size:13.5px;padding:40px 0}

  /* ---------- Bottom nav ---------- */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(244,240,231,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--line);
    display:flex;padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{flex:1;background:none;border:none;cursor:pointer;height:var(--nav-h);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-faint);font-family:inherit;transition:color .15s;position:relative}
  .tab svg{width:23px;height:23px}
  .tab span{font-size:10.5px;font-weight:600;letter-spacing:.01em}
  .tab.on{color:var(--accent)}
  .tab.on::before{content:"";position:absolute;top:0;width:30px;height:3px;border-radius:0 0 3px 3px;background:var(--accent)}

  footer{text-align:center;color:var(--ink-faint);font-size:11.5px;padding:26px 0 10px}
  footer .kj{font-family:'Fraunces',serif;font-size:15px;color:var(--line-strong);margin-bottom:4px}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <span class="kanji">関西 · Kansai Trip</span>
      <span class="sub">Jun 2–9, 2026 · 2 adults + 2 kids</span>
    </div>
    <div class="status" id="status">—</div>
  </div>
</header>

<div class="wrap">
  <main>
    <!-- DAYS -->
    <section class="view active" id="view-days">
      <h1 class="view-title">Itinerary</h1>
      <p class="view-sub">Tap a day to open its plan, options &amp; eats.</p>
      <div id="days"></div>
    </section>

    <!-- REFERENCE -->
    <section class="view" id="view-ref">
      <h1 class="view-title">Reference</h1>
      <p class="view-sub">Bookings, transport, addresses &amp; checklists.</p>
      <div id="ref"></div>
    </section>

    <!-- FOOD -->
    <section class="view" id="view-food">
      <h1 class="view-title">Food &amp; Places</h1>
      <p class="view-sub">40+ spots by area — eats, cafes &amp; bookshops.</p>
      <div class="filters" id="filters"></div>
      <div id="food"></div>
    </section>
  </main>

  <footer>
    <div class="kj">よい旅を</div>
    Have a great trip · built from your itinerary &amp; research
  </footer>
</div>

<nav class="tabs">
  <button class="tab on" data-v="days">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
    <span>Days</span>
  </button>
  <button class="tab" data-v="ref">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span>Reference</span>
  </button>
  <button class="tab" data-v="food">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2v20M5 2v7a2 2 0 0 0 4 0V2M17 2v20M17 14c2 0 4-1.5 4-6 0-3.5-1-6-4-6"/></svg>
    <span>Food</span>
  </button>
</nav>

<script>
/* ============================================================
   DATA
   ============================================================ */
const AREA = {
  osaka:{name:'Osaka',c:'var(--osaka)',soft:'#f3e3da'},
  kobe:{name:'Kobe · Arima',c:'var(--kobe)',soft:'#dde9e8'},
  kyoto:{name:'Kyoto',c:'var(--kyoto)',soft:'#e7e7d4'},
  nara:{name:'Nara',c:'var(--nara)',soft:'#efe2cb'},
  travel:{name:'Travel day',c:'var(--ink-faint)',soft:'#ebe6da'},
};

const DAYS = [
  {
    n:1, date:'2026-06-02', wd:'Tuesday', area:'osaka',
    title:'Arrival in Osaka',
    stay:'Airbnb · Fukushima-ku',
    blocks:[
      {type:'logistics', items:[
        ['','<b>8:00am</b> — Land at Kansai (KIX). Allow 60–90 min for immigration &amp; bags.'],
        ['','Buy <b>ICOCA cards</b> + discounted <b>Haruka one-way</b> ticket (passport needed).'],
        ['','Haruka → Osaka Station (~50 min), then 1 Loop Line stop to <b>Fukushima</b>.'],
        ['','Airbnb check-in <b>4pm</b> — store bags in Namba/station coin lockers first.'],
      ]},
      {type:'options', title:'Afternoon — choose by energy', items:[
        {tag:'Option A', name:'Low-key recovery', rec:true, points:[
          'Drop bags, wander <b>Dotonbori</b> — Glico sign, crab, street food',
          'Cafe rest, maybe a park nap',
          'Snacks at <b>Don Quijote</b> (24hr)',
          'Easy dinner near Fukushima — ramen or okonomiyaki',
        ]},
        {tag:'Option B', name:'Explore immediately', points:[
          '<b>Shinsekai</b> district — retro vibes, kushikatsu',
          'Tennoji Zoo or <b>Abeno Harukas</b> (60th-floor views)',
          'Dinner in Dotonbori — takoyaki, gyoza, sushi',
        ]},
      ]},
      {type:'eat', title:'Dinner near Fukushima-ku', items:[
        ['','Local izakaya street — great value &amp; very local'],
        ['','<b>551 Horai</b> butaman in the Umeda dept-store food halls'],
        ['','Osaka Ohsho (gyoza, kid-friendly) · Ichiran (solo booths)'],
      ]},
      {type:'tip', items:[['','Get an <b>eSIM / pocket wifi</b> at KIX arrivals too — counters for IIJmio, Softbank, Docomo.']]},
    ]
  },
  {
    n:2, date:'2026-06-03', wd:'Wednesday', area:'osaka',
    title:'Osaka morning + USJ from 3pm',
    stay:'Airbnb · Fukushima-ku',
    blocks:[
      {type:'options', title:'Morning before USJ', items:[
        {tag:'Option A', name:'Osaka Castle', rec:true, points:[
          'Opens <b>9am</b> — arrive early to beat groups',
          'Keep open 9:00–17:00 (last entry 16:30). Adult ~¥600, under-15 free',
          'Head to USJ after lunch (~12:30pm)',
        ]},
        {tag:'Option B', name:'Kuromon Market', points:[
          '150–180 stalls — go before 11am for best atmosphere',
          'Sashimi, grilled scallops/crab, tamagoyaki, fruit',
          'Combine with a Dotonbori walk',
        ]},
        {tag:'Option C', name:'USJ early', points:[
          'If kids are keen (or slept poorly), just go when it opens',
          'Maximise park time, skip the morning stop',
        ]},
      ]},
      {type:'sched', title:'At USJ — 3pm onward', items:[
        ['On entry','Open the <b>USJ app</b>, grab a free Super Nintendo World timed-entry ticket immediately'],
        ['Priority','Super Nintendo World (Mario Kart) + one Harry Potter ride'],
        ['Evening','Harry Potter area is magical at night · Minion Park for the 11yr old'],
        ['Dinner','Eat inside the park to save travel time'],
      ]},
      {type:'callout', items:[['⚠️','<b>2026 is USJ\'s 25th anniversary</b> — crowds at a decade high. App timed-entry can sell out by ~10:15–10:30am. From Jan 5 2026 the app is required for tickets.']]},
    ]
  },
  {
    n:3, date:'2026-06-04', wd:'Thursday', area:'osaka',
    title:'USJ full day',
    stay:'Airbnb · Fukushima-ku',
    blocks:[
      {type:'callout', items:[['🎟️','<b>Buy Express Passes for TODAY</b>, not Jun 3. Express Pass 7 from ~¥21,800; only <b>Premium</b> guarantees both Nintendo + Donkey Kong. Each person (incl. kids) needs their own. Buy days ahead — they sell out.']]},
      {type:'sched', title:'Suggested full day', items:[
        ['9:00','Gates open → straight to Super Nintendo World'],
        ['9–11','Mario Kart, Yoshi\'s Adventure, Power-Up Band activities'],
        ['11–12:30','Donkey Kong Country (newer, quieter mid-morning)'],
        ['12:30','Lunch — Kinopio\'s Cafe (book via app) or Circus'],
        ['1:30','Harry Potter — Forbidden Journey, Ollivanders, Butterbeer'],
        ['3:30','Minion Park — Despicable Me ride + meet & greet'],
        ['5:00','Jurassic Park water ride (bring ponchos!)'],
        ['6:30','Re-ride favourites · evening atmosphere'],
      ]},
      {type:'tip', items:[
        ['','<b>Ponchos</b> for the Jurassic Park ride — it soaks you'],
        ['','Coin lockers inside (~¥300) · portable battery (app drains phones)'],
        ['','Mario Power-Up Band ~¥3,500 — optional but the 11yr old will love it'],
        ['','Stay hydrated — June is warm &amp; humid'],
      ]},
    ]
  },

// ---- status / today ----
const TRIP = DAYS.map(d=>d.date);
function todayKey(){
  const n = new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function dayDiff(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function renderStatus(){
  const tk = todayKey();
  const idx = TRIP.indexOf(tk);
  const st = $('#status');
  if(idx>=0){ st.innerHTML = '<b>Day '+(idx+1)+'</b>today'; return idx; }
  const toStart = dayDiff(tk, TRIP[0]);
  if(toStart>0){ st.innerHTML = '<b>'+toStart+'</b>day'+(toStart>1?'s':'')+' to go'; }
  else if(dayDiff(tk,TRIP[TRIP.length-1])>=0){ st.innerHTML='<b>•</b>in transit'; }
  else { st.innerHTML = 'おかえり<br>welcome home'; }
  return -1;
}

// ---- days ----
function liHTML(items){
  return items.map(([_,html])=>`<div class="li"><span class="bullet"></span><span>${html}</span></div>`).join('');
}
function blockHTML(b){
  const heads={logistics:['📍','Logistics'],eat:['🍜','Eat'],tip:['💡','Tips'],sched:['🕘',b.title||'Schedule'],options:['🔀',b.title||'Options'],callout:['','']};
  if(b.type==='callout'){
    return b.items.map(([ic,html])=>`<div class="callout"><span class="ic">${ic}</span><span>${html}</span></div>`).join('');
  }
  let inner='';
  if(b.type==='sched'){
    inner = b.items.map(([tm,ac])=>`<div class="sched"><div class="tm">${tm}</div><div class="ac">${ac}</div></div>`).join('');
  } else if(b.type==='options'){
    inner = b.items.map(o=>`
      <div class="opt${o.rec?' rec':''}">
        <div class="opt-h"><span class="opt-tag">${o.tag}</span><span class="opt-name">${o.name}</span>${o.rec?'<span class="opt-rec-badge">★ pick</span>':''}</div>
        ${o.points.map(p=>`<div class="li"><span class="bullet"></span><span>${p}</span></div>`).join('')}
      </div>`).join('');
  } else {
    inner = liHTML(b.items);
  }
  const [ic,label]=heads[b.type]||['',''];
  const h = label?`<div class="block-h"><span class="ic">${ic}</span>${label}</div>`:'';
  return `<div class="block">${h}${inner}</div>`;
}
function renderDays(todayIdx){
  const wrap=$('#days');
  wrap.innerHTML = DAYS.map((d,i)=>{
    const a=AREA[d.area];
    return `
    <article class="day-card${i===todayIdx?' today':''}" data-i="${i}" style="--c:${a.c};--c-soft:${a.soft}">
      <div class="stripe"></div>
      ${i===todayIdx?'<span class="today-flag">Today</span>':''}
      <div class="day-head">
        <div class="daynum"><span class="d">Day</span><span class="n">${d.n}</span></div>
        <div class="day-meta">
          <div class="dt">${d.wd}, ${new Date(d.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          <div class="ti">${d.title}</div>
          <span class="pl"><span class="dot"></span>${d.stay}</span>
        </div>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </div>
      <div class="day-body">${d.blocks.map(blockHTML).join('')}</div>
    </article>`;
  }).join('');
  wrap.querySelectorAll('.day-card').forEach(card=>{
    card.querySelector('.day-head').addEventListener('click',()=>card.classList.toggle('open'));
  });
  // auto-open today
  if(todayIdx>=0) wrap.querySelectorAll('.day-card')[todayIdx].classList.add('open');
}

// ---- reference ----
function renderRef(){
  const accordion=(ic,title,body,open)=>`
    <details class="acc"${open?' open':''}>
      <summary><span class="ic">${ic}</span>${title}<span class="arr"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></summary>
      <div class="inner">${body}</div>
    </details>`;

  const stays = STAYS.map(s=>{
    const a=AREA[s.area];
    return `<div class="stay"><div class="bar" style="background:${a.c}"></div><div class="info">
      <div class="dates" style="color:${a.c}">${s.dates}</div>
      <div class="nm">${s.nm}</div><div class="det">${s.det}</div>
      <a class="map" style="--c:${a.c}" href="${mapURL(s.map)}" target="_blank" rel="noopener">${PIN}${s.maplabel}</a>
      </div></div>`;
  }).join('');

  const flights = `<div class="row"><div class="l"><b>Arrive · KIX</b><span>Tue Jun 2</span></div><div class="r">8:00am</div></div>
    <div class="row"><div class="l"><b>Depart · KIX</b><span>Tue Jun 9</span></div><div class="r">6:00pm</div></div>`;

  const transport = TRANSPORT.map(r=>`<div class="row"><div class="l"><b>${r.l}</b><span>${r.s}</span></div><div class="r">${r.f}<small>${r.t}</small></div></div>`).join('')
    + `<div class="callout" style="margin-top:12px"><span class="ic">*</span><span>Fares marked * are the discounted foreigner <b>Haruka one-way</b> price (passport required). Regular Haruka to Kyoto is ¥3,060.</span></div>`;

  const tasksPre = TASKS.filter(t=>t.k.startsWith('pre')).map(t=>taskHTML(t)).join('');
  const tasksArr = TASKS.filter(t=>t.k.startsWith('arr')).map(t=>taskHTML(t)).join('');

  const ic = '💴 IC cards: ~¥2,000 (¥1,500 credit + ¥500 deposit). Work on trains, buses, konbini, lockers, vending machines across Kansai.';
  const money = `<div class="li"><span class="bullet"></span><span><b>Cash still matters</b> — small shops, markets (Nishiki, Kuromon), temples &amp; Nakatanidou are often cash-only.</span></div>
    <div class="li"><span class="bullet"></span><span><b>7-Bank ATMs</b> (in 7-Eleven) reliably accept foreign cards.</span></div>
    <div class="li"><span class="bullet"></span><span>IC cards &amp; credit cards work in chains, dept stores &amp; USJ.</span></div>
    <div class="li"><span class="bullet"></span><span>June = <b>tsuyu</b> (rainy season), ~19–28°C, humid. Keep indoor backups: bookshops, depachika, markets, museums.</span></div>`;

  const packing = `<div class="pill-list">${PACKING.map(p=>`<span class="pill">${p}</span>`).join('')}</div>`;

  $('#ref').innerHTML =
    accordion('🏠','Where you\'re staying', stays, true) +
    accordion('✈️','Flights', flights, false) +
    accordion('✅','Before you go', tasksPre, false) +
    accordion('🛬','On arrival at KIX', tasksArr, false) +
    accordion('🚃','Getting around', transport, false) +
    accordion('💴','Money &amp; weather', `<div class="li"><span class="bullet"></span><span>${ic}</span></div>`+money, false) +
    accordion('🧳','Packing essentials', packing, false);

  // task interactions
  $('#ref').querySelectorAll('.task').forEach(el=>{
    const k=el.dataset.k;
    if(localStorage.getItem('task_'+k)==='1') el.classList.add('done');
    el.addEventListener('click',e=>{
      e.preventDefault();
      el.classList.toggle('done');
      localStorage.setItem('task_'+k, el.classList.contains('done')?'1':'0');
    });
  });
}
function taskHTML(t){
  return `<div class="task" data-k="${t.k}"><div class="box">✓</div><div class="tx">${t.t}</div></div>`;
}

// ---- food ----
const CATS=[['all','All'],['eat','Eat'],['cafe','Cafe'],['book','Books'],];
let foodFilter='all';
function renderFilters(){
  $('#filters').innerHTML = CATS.map(([k,l])=>`<button class="fbtn${k===foodFilter?' on':''}" data-c="${k}">${l}</button>`).join('');
  $('#filters').querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
    foodFilter=b.dataset.c; renderFilters(); renderFood();
  }));
}
function renderFood(){
  const list = PLACES.filter(p=>foodFilter==='all'||p.cat===foodFilter);
  if(!list.length){ $('#food').innerHTML='<div class="empty">No spots in this filter.</div>'; return; }
  // group by area then sub
  const order=['osaka','kobe','kyoto','nara'];
  let html='';
  order.forEach(ar=>{
    const inAr=list.filter(p=>p.area===ar);
    if(!inAr.length) return;
    const a=AREA[ar];
    const subs=[...new Set(inAr.map(p=>p.sub))];
    html+=`<div class="area-h" style="color:${a.c}"><span class="dot" style="background:${a.c}"></span>${a.name}</div>`;
    subs.forEach(sub=>{
      html+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:10px 0 7px">${sub}</div>`;
      inAr.filter(p=>p.sub===sub).forEach(p=>{
        const meta=[
          p.hrs?`<span>🕘 <b>${p.hrs}</b></span>`:'',
          p.loc?`<span>📍 <b>${p.loc}</b></span>`:'',
          `<a class="maplink" style="--c:${a.c}" href="${mapURL(placeQuery(p))}" target="_blank" rel="noopener">${PIN}Maps</a>`
        ].filter(Boolean).join('');
        html+=`<div class="place" style="--c:${a.c}">
          <div class="place-top"><div class="nm">${p.nm}</div>${p.pr?`<div class="pr">${p.pr}</div>`:''}</div>
          <span class="ty">${p.ty}</span>
          <div class="ds">${p.ds}</div>
          <div class="mt">${meta}</div>
        </div>`;
      });
    });
  });
  $('#food').innerHTML=html;
}

// ---- tabs ----
function initTabs(){
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    const v=t.dataset.v;
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    $('#view-'+v).classList.add('active');
    window.scrollTo({top:0,behavior:'instant'});
  }));
}

// ---- boot ----
const todayIdx = renderStatus();
renderDays(todayIdx);
renderRef();
renderFilters();
renderFood();
initTabs();
</script>
</body>
</html>
