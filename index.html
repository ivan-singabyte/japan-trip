<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1f1d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kansai Trip">
<title>Kansai Family Trip · June 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f0e7;
    --paper-2:#fffdf8;
    --ink:#211f1b;
    --ink-soft:#5a554c;
    --ink-faint:#938c7e;
    --line:#e2dccf;
    --line-strong:#d2cab8;
    --accent:#c2512c;       /* persimmon */
    --accent-soft:#f3e3da;
    --osaka:#c2512c;        /* persimmon */
    --kobe:#3f6f6e;         /* arima teal */
    --kyoto:#6a6a31;        /* matcha */
    --nara:#a9762a;         /* deer ochre */
    --shadow:0 1px 2px rgba(40,33,20,.05),0 8px 24px rgba(40,33,20,.06);
    --shadow-lg:0 2px 6px rgba(40,33,20,.08),0 20px 50px rgba(40,33,20,.12);
    --nav-h:64px;
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(rgba(120,108,84,.05) 1px,transparent 1px);
    background-size:4px 4px;
  }
  .wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 18px}

  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:30;
    background:rgba(244,240,231,.82);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .top-inner{max-width:640px;margin:0 auto;padding:13px 18px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;flex-direction:column;line-height:1.1}
  .brand .kanji{font-family:'Fraunces',serif;font-weight:600;font-size:20px;letter-spacing:-.01em}
  .brand .sub{font-size:11px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .status{
    text-align:right;font-size:11px;font-weight:700;line-height:1.25;
    padding:6px 10px;border-radius:999px;background:var(--paper-2);
    border:1px solid var(--line-strong);color:var(--ink-soft);white-space:nowrap;
  }
  .status b{color:var(--accent);display:block;font-size:13px}

  /* ---------- Sections / tabs ---------- */
  main{padding-top:18px;min-height:60vh}
  .view{display:none;animation:fade .35s ease both}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .view-title{font-family:'Fraunces',serif;font-weight:600;font-size:27px;letter-spacing:-.02em;margin-bottom:2px}
  .view-sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:18px}

  /* ---------- Day cards ---------- */
  .day-card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);margin-bottom:13px;overflow:hidden;
    position:relative;cursor:pointer;transition:transform .15s ease,box-shadow .2s ease;
  }
  .day-card:active{transform:scale(.992)}
  .day-card.today{box-shadow:var(--shadow-lg);border-color:var(--accent)}
  .day-card .stripe{position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c)}
  .day-head{display:flex;align-items:center;gap:14px;padding:15px 16px 15px 20px}
  .daynum{
    flex:0 0 auto;width:46px;height:46px;border-radius:12px;
    background:var(--c-soft,var(--accent-soft));color:var(--c);
    display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
  }
  .daynum .d{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.8}
  .daynum .n{font-family:'Fraunces',serif;font-weight:600;font-size:21px}
  .day-meta{flex:1;min-width:0}
  .day-meta .dt{font-size:11.5px;color:var(--ink-faint);font-weight:600;letter-spacing:.02em}
  .day-meta .ti{font-family:'Fraunces',serif;font-size:17.5px;font-weight:500;letter-spacing:-.01em;margin:1px 0 3px}
  .day-meta .pl{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--c)}
  .pl .dot{width:7px;height:7px;border-radius:50%;background:var(--c)}
  .chev{flex:0 0 auto;color:var(--ink-faint);transition:transform .25s ease}
  .day-card.open .chev{transform:rotate(90deg)}
  .today-flag{position:absolute;top:0;right:0;background:var(--accent);color:#fff;font-size:9.5px;font-weight:700;letter-spacing:.07em;padding:3px 9px;border-bottom-left-radius:10px;text-transform:uppercase}

  .day-body{display:none;padding:0 16px 4px 20px}
  .day-card.open .day-body{display:block;animation:fade .3s ease both}

  .navmaps{display:flex;flex-wrap:wrap;gap:6px;padding:13px 0 2px;border-top:1px solid var(--line)}
  .navmaps .nh{flex-basis:100%;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);margin-bottom:3px}
  .navchip{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--c);background:var(--c-soft,var(--accent-soft));border:1px solid transparent;padding:5px 9px;border-radius:999px;text-decoration:none}
  .navchip:active{opacity:.6}
  .navchip svg{width:11px;height:11px}
  .navchip.route{color:#fff;background:var(--c);font-weight:700}

  /* weather strip */
  .wx{display:flex;align-items:center;gap:8px;background:var(--c-soft,var(--accent-soft));border-radius:10px;padding:8px 11px;font-size:12.5px;color:var(--ink-soft);line-height:1.35;margin:13px 0 2px}
  .wx .ic{flex:0 0 auto}
  .wx-t{flex:1}
  .wx-t b{color:var(--ink);font-weight:600}
  .wx-link{flex:0 0 auto;font-size:11px;font-weight:700;color:var(--c);text-decoration:none;white-space:nowrap}
  .wx-link:active{opacity:.6}

  .block{border-top:1px solid var(--line);padding:14px 0}
  .block:first-child{border-top:none}
  .block-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);margin-bottom:9px}
  .block-h .ic{font-size:13px}

  .li{display:flex;gap:9px;font-size:14px;color:var(--ink-soft);margin-bottom:7px;line-height:1.45}
  .li:last-child{margin-bottom:0}
  .li .bullet{flex:0 0 auto;width:5px;height:5px;border-radius:50%;background:var(--line-strong);margin-top:8px}
  .li b{color:var(--ink);font-weight:600}
  .li-map{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:700;color:var(--c);text-decoration:none;white-space:nowrap;vertical-align:baseline;margin-left:2px}
  .li-map svg{width:10px;height:10px}
  .li-map:active{opacity:.5}

  /* schedule rows */
  .sched{display:flex;gap:11px;margin-bottom:9px}
  .sched:last-child{margin-bottom:0}
  .sched .tm{flex:0 0 64px;font-size:12px;font-weight:700;color:var(--c);font-variant-numeric:tabular-nums;padding-top:1px}
  .sched .ac{font-size:13.5px;color:var(--ink-soft);line-height:1.4;border-left:1px solid var(--line);padding-left:11px}
  .sched .ac b{color:var(--ink);font-weight:600}

  /* options */
  .opt{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
  .opt:last-child{margin-bottom:0}
  .opt.rec{border-color:var(--c);background:linear-gradient(0deg,var(--c-soft,var(--accent-soft)),var(--paper-2))}
  .opt-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .opt-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#fff;background:var(--c);padding:2px 7px;border-radius:6px}
  .opt-name{font-weight:600;font-size:14px;color:var(--ink)}
  .opt-rec-badge{margin-left:auto;font-size:10px;font-weight:700;color:var(--c);text-transform:uppercase;letter-spacing:.04em}
  .opt .li{font-size:13px;margin-bottom:5px}
  .opt .li .bullet{background:var(--c);opacity:.5}
  .opt-sched{margin-top:9px;border-top:1px dashed var(--line);padding-top:9px}
  .opt-sched-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin-bottom:7px}
  .opt-sched .sched .tm{flex:0 0 52px}

  .callout{display:flex;gap:9px;background:var(--accent-soft);border-radius:10px;padding:10px 12px;font-size:13px;color:#7a3417;line-height:1.45;margin-top:4px}
  .callout .ic{flex:0 0 auto}
  .callout b{color:#612810}

  /* ---------- Booking / e-ticket ---------- */
  .ticket{background:var(--paper-2);border:1px solid var(--line-strong);border-radius:12px;overflow:hidden;margin:6px 0 4px;box-shadow:var(--shadow)}
  .ticket .tk-head{display:flex;align-items:center;gap:9px;padding:11px 13px;background:var(--c,var(--accent));color:#fff}
  .ticket .tk-head .ic{font-size:15px}
  .ticket .tk-head .tt{font-weight:700;font-size:13.5px;letter-spacing:.01em}
  .ticket .tk-head .bk{margin-left:auto;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:rgba(255,255,255,.22);padding:3px 8px;border-radius:999px}
  .ticket .tk-warn{display:flex;gap:8px;background:#fbeee6;color:#7a3417;font-size:12px;line-height:1.4;padding:9px 13px;border-bottom:1px solid var(--line)}
  .ticket .tk-warn b{color:#612810}
  .ticket .tk-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
  .ticket .tk-cell{background:var(--paper-2);padding:9px 13px}
  .ticket .tk-cell.full{grid-column:1 / -1}
  .ticket .tk-cell .k{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin-bottom:2px}
  .ticket .tk-cell .v{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.3}
  .ticket .tk-cell .v small{display:block;font-weight:500;color:var(--ink-soft);font-size:11.5px;margin-top:1px}
  .ticket .tk-cell .v .big{font-family:'Fraunces',serif;font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
  .ticket .tk-map{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:11.5px;font-weight:700;color:var(--c,var(--accent));text-decoration:none}
  .ticket .tk-map svg{width:12px;height:12px}

  /* ---------- Reference ---------- */
  .acc{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
  .acc>summary{list-style:none;cursor:pointer;padding:15px 16px;display:flex;align-items:center;gap:11px;font-weight:600;font-size:15.5px}
  .acc>summary::-webkit-details-marker{display:none}
  .acc>summary .ic{font-size:17px;width:24px;text-align:center}
  .acc>summary .arr{margin-left:auto;color:var(--ink-faint);transition:transform .25s}
  .acc[open]>summary{border-bottom:1px solid var(--line)}
  .acc[open]>summary .arr{transform:rotate(180deg)}
  .acc .inner{padding:14px 16px 16px}

  .row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
  .row:first-child{border-top:none}
  .row .l{font-size:13.5px}
  .row .l b{display:block;font-weight:600;color:var(--ink);margin-bottom:1px}
  .row .l span{color:var(--ink-faint);font-size:12px}
  .row .r{text-align:right;font-size:13px;font-weight:600;color:var(--ink-soft);white-space:nowrap;flex:0 0 auto;font-variant-numeric:tabular-nums}
  .row .r small{display:block;font-weight:500;color:var(--ink-faint);font-size:11px}

  .stay{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .stay:first-child{border-top:none}
  .stay .bar{flex:0 0 4px;border-radius:3px;background:var(--c)}
  .stay .info{flex:1}
  .stay .dates{font-size:11.5px;font-weight:700;color:var(--c);text-transform:uppercase;letter-spacing:.03em}
  .stay .nm{font-weight:600;font-size:14.5px;margin:2px 0 2px}
  .stay .det{font-size:12.5px;color:var(--ink-soft);line-height:1.45}
  .stay .det code{background:var(--paper);padding:1px 6px;border-radius:5px;font-size:11.5px;border:1px solid var(--line-strong);font-family:ui-monospace,monospace}

  .task{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line);cursor:pointer}
  .task:first-child{border-top:none}
  .task .box{flex:0 0 auto;width:21px;height:21px;border-radius:6px;border:2px solid var(--line-strong);margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s;color:#fff;font-size:13px;font-weight:700}
  .task.done .box{background:var(--accent);border-color:var(--accent)}
  .task .tx{font-size:13.5px;color:var(--ink-soft);line-height:1.45;transition:.15s}
  .task .tx b{color:var(--ink);font-weight:600}
  .task.done .tx{opacity:.5;text-decoration:line-through}

  .pill-list{display:flex;flex-wrap:wrap;gap:7px}
  .pill{font-size:12.5px;background:var(--paper);border:1px solid var(--line-strong);border-radius:8px;padding:6px 10px;color:var(--ink-soft)}

  /* emergency + currency */
  .erow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line);text-decoration:none;color:inherit}
  .erow:first-child{border-top:none}
  .erow:active{opacity:.6}
  .erow .l{min-width:0}
  .erow .l b{display:block;font-weight:600;color:var(--ink);font-size:13.5px}
  .erow .l span{color:var(--ink-faint);font-size:12px;line-height:1.35}
  .erow .r{font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:5px;flex:0 0 auto}
  .erow.big .r{font-size:21px}
  .erow .r.todo{color:var(--ink-faint);font-weight:600;font-size:11.5px}
  .erow .r svg{width:13px;height:13px;opacity:.75}
  .ehosp{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px}
  .fxgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
  .fxcell{display:flex;justify-content:space-between;align-items:baseline;background:var(--paper);border:1px solid var(--line-strong);border-radius:9px;padding:7px 11px}
  .fxcell .y{font-weight:700;font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums}
  .fxcell .s{font-size:12.5px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}

  /* ---------- Food ---------- */
  .filters{position:sticky;top:calc(env(safe-area-inset-top) + 56px);z-index:20;display:flex;gap:7px;overflow-x:auto;padding:4px 0 12px;margin:0 -18px;padding-left:18px;padding-right:18px;-ms-overflow-style:none;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fbtn{flex:0 0 auto;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;background:var(--paper-2);border:1px solid var(--line-strong);color:var(--ink-soft);cursor:pointer;transition:.15s;white-space:nowrap}
  .fbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .area-h{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--c);margin:18px 0 9px;display:flex;align-items:center;gap:8px}
  .area-h .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}
  .area-h:first-child{margin-top:2px}
  .place{background:var(--paper-2);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow)}
  .place-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .place .nm{font-weight:600;font-size:14.5px;color:var(--ink);line-height:1.25}
  .place .pr{font-size:12.5px;font-weight:700;color:var(--c);white-space:nowrap;flex:0 0 auto;font-variant-numeric:tabular-nums}
  .place .ty{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);margin-top:5px}
  .place .ds{font-size:12.5px;color:var(--ink-soft);line-height:1.45;margin-top:5px}
  .place .mt{font-size:11.5px;color:var(--ink-faint);margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 12px}
  .place .mt span b{color:var(--ink-soft);font-weight:600}
  .maplink{display:inline-flex;align-items:center;gap:4px;color:var(--c,var(--accent));font-weight:700;text-decoration:none}
  .maplink:active{opacity:.6}
  .maplink svg{width:13px;height:13px}
  .stay .map{display:inline-flex;align-items:center;gap:4px;margin-top:7px;font-size:12px;font-weight:700;color:var(--c);text-decoration:none;background:var(--paper);border:1px solid var(--line-strong);padding:4px 9px;border-radius:8px}
  .stay .map svg{width:13px;height:13px}
  .empty{text-align:center;color:var(--ink-faint);font-size:13.5px;padding:40px 0}

  /* ---------- Bottom nav ---------- */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(244,240,231,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--line);
    display:flex;padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{flex:1;background:none;border:none;cursor:pointer;height:var(--nav-h);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-faint);font-family:inherit;transition:color .15s;position:relative}
  .tab svg{width:23px;height:23px}
  .tab span{font-size:10.5px;font-weight:600;letter-spacing:.01em}
  .tab.on{color:var(--accent)}
  .tab.on::before{content:"";position:absolute;top:0;width:30px;height:3px;border-radius:0 0 3px 3px;background:var(--accent)}

  footer{text-align:center;color:var(--ink-faint);font-size:11.5px;padding:26px 0 10px}
  footer .kj{font-family:'Fraunces',serif;font-size:15px;color:var(--line-strong);margin-bottom:4px}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <span class="kanji">関西 · Kansai Trip</span>
      <span class="sub">Jun 2–9, 2026 · 2 adults + 2 kids</span>
    </div>
    <div class="status" id="status">—</div>
  </div>
</header>

<div class="wrap">
  <main>
    <!-- DAYS -->
    <section class="view active" id="view-days">
      <h1 class="view-title">Itinerary</h1>
      <p class="view-sub">Tap a day to open its plan, options &amp; eats.</p>
      <div id="days"></div>
    </section>

    <!-- REFERENCE -->
    <section class="view" id="view-ref">
      <h1 class="view-title">Reference</h1>
      <p class="view-sub">Bookings, transport, addresses &amp; checklists.</p>
      <div id="ref"></div>
    </section>

    <!-- FOOD -->
    <section class="view" id="view-food">
      <h1 class="view-title">Food &amp; Places</h1>
      <p class="view-sub">40+ spots by area — eats, cafes &amp; bookshops.</p>
      <div class="filters" id="filters"></div>
      <div id="food"></div>
    </section>
  </main>

  <footer>
    <div class="kj">よい旅を</div>
    Have a great trip · built from your itinerary &amp; research
  </footer>
</div>

<nav class="tabs">
  <button class="tab on" data-v="days">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
    <span>Days</span>
  </button>
  <button class="tab" data-v="ref">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span>Reference</span>

    route:['Sannomiya Station Kobe','Kitano Ijinkan Kobe','Nankinmachi Chinatown Kobe','Sannomiya Bus Terminal Mint Kobe','Arima Gyoen Ryokan Kobe'],
    blocks:[
      {type:'logistics', title:'Osaka → Kobe → Arima', items:[
        ['','Check out Osaka Airbnb by <b>11am</b> · Arima Gyoen check-in <b>3pm</b> (out 10am). Stash bags in a Sannomiya / Shin-Kobe coin locker for the Kobe stop.'],
        ['','<b>Simplest:</b> walk to Hanshin Fukushima → train toward Kobe-Sannomiya, ~35–40 min, ~¥330, no transfer'],
        ['','<b>Faster:</b> JR Fukushima → Osaka Station (1 Loop stop) → JR Special Rapid (Kobe Line) to Sannomiya, ~22 min, ~¥420 (total ~30–35 min)'],
        ['','<b>Sannomiya → Arima — two direct buses, both badged “Arima Express”:</b>'],
        ['','• <b>Shinki Bus ¥600 · ~25 min · no reservation</b> — board first, pay on exit, <b>ICOCA OK</b>. ~hourly (the Kobe-Sanda Outlets bus, stops at Arima). <b>Best pick with luggage &amp; kids</b> — but capacity is first-come, so check the next departure on arrival.', 'Sannomiya Bus Terminal Mint Kobe'],
        ['','• <b>JR / Honshi “Arima Express” ¥780 · ~30 min · all reserved-seat</b> — book via Kosoku Bus Net (¥700 if 7-days ahead). You may still board on the day <i>if</i> seats are free. Good fallback if the Shinki bus is full or just left.'],
        ['','Train alt (2 transfers): Subway → Tanigami → Kobe Electric Rwy → Arimaguchi → Arima, ~30 min ride, <b>~¥720</b>'],
        ['','<b>Money-saver:</b> the “Arima Onsen Greedy Ticket” (¥2,400, 3-day) bundles round-trip Sannomiya–Arima bus + Kin no Yu + Gin no Yu admission — sold at the Sannomiya bus ticket counter. Worth it if you’ll use both public baths.'],
        ['','Some ryokan offer bus/station pickup — worth asking when you confirm.'],
      ]},
      {type:'callout', items:[['📝','<b>Sort today:</b> reconfirm the <b>Arima Gyoen kaiseki dinner</b> is on the booking; if you want the reserved <b>JR/Honshi Arima Express</b> bus, book 4 seats on Kosoku Bus Net (else just walk on the ¥600 Shinki bus); for a Friday Kobe-beef lunch, <b>reserve Steakland/Propeller</b> for 4 (the rest are walk-in &amp; queue).']]},
      {type:'options', title:'Kobe stop before Arima', items:[
        {tag:'Option A', name:'Kobe beef lunch + Kitano', rec:true, points:[
          'Store bags at Shin-Kobe / Sannomiya lockers first',
          ['<b>Kitano-cho (Ijinkan):</b> European-style historic mansions ~10–15 min uphill from Sannomiya — fun ~1 hr walk; district free to roam, individual houses ~¥550–880 (combo passes from ~¥1,540), 9:30–18:00','Kitano Ijinkan Kobe'],
          ['This is the moment for <b>Kobe beef</b> at the source — Steakland &amp; Propeller take bookings, the rest are walk-in &amp; can queue/sell out, so reserve or arrive at opening','Steakland Kobe Sannomiya'],
          'Catch the ~2pm Shinki/Arima Express bus up to Arima, check in ~3pm',
        ], sched:[
          ['~11:30','Arrive Sannomiya · lockers for bags','Sannomiya Station Kobe'],
          ['~11:45','Walk up to <b>Kitano Ijinkan</b> — stroll the mansion streets (~1 hr)','Kitano Ijinkan Kobe'],
          ['~12:45','<b>Kobe beef lunch</b> back near Sannomiya (book ahead or arrive early)','Steakland Kobe Sannomiya'],
          ['~14:00','Grab the bus from <b>Sannomiya Bus Terminal (Mint Kobe)</b> to Arima','Sannomiya Bus Terminal Mint Kobe'],
          ['~14:30','Arrive <b>Arima Gyoen</b>, check in ~3pm, first soak before dinner','Arima Gyoen Ryokan Kobe'],
        ]},
        {tag:'Option B', name:'Skip Kobe, straight to Arima', points:[

          'More time at the ryokan — use the baths earlier, slower afternoon',

      {type:'eat', title:'Kobe beef lunch (affordable picks · all open Fri)', items:[
        ['','<b>Steakland Kobe</b> (Sannomiya) — teppanyaki cooked at your counter (a hit with the boys). 150g Kobe beef set ~<b>¥3,500</b>; 10:30–14:00 / 17:00–22:00. Takes bookings (phone/EPARK) — otherwise expect a line.','Steakland Kobe Sannomiya'],
        ['','<b>Kobe Steak Propeller</b> — casual, cozy; Steak S lunch (100g) ~¥3,000 + ~¥500 set; 11:00–21:30. Reserve via byFood/Klook.','Kobe Steak Propeller Sannomiya'],
        ['','<b>Hiroshige</b> — Kobe beef gyudon <b>¥1,300 (large ¥1,500)</b>; tiny ~10 seats, 11:00–15:00 / 18:00–22:00, <b>closed Wed</b>. Cheapest taste of Kobe beef — walk-in only, can sell out by lunch &amp; queue ~1 hr.','Kobe Gyudon Hiroshige Sannomiya'],
        ['','<b>Nagata Tank Suji</b> (Sun Plaza B1F) — Kobe soul-food soba-meshi + beef-tendon bokkake, ~¥800–1,000; 11:00–22:00, <b>closed Tue</b>. Casual &amp; cheap.','Nagata Tank Suji Sun Plaza Kobe'],
        ['','<b>Nankinmachi</b> Chinatown street food — Roushouki pork buns (¥100 ea), fried soup dumplings, beef croquettes, ~¥200–800. Lively, kid-friendly; lines 30–60 min at busy stalls.','Nankinmachi Chinatown Kobe'],
        ['','Cafe en route: <b>Freundlieb</b> (Kitano) — bakery-café in a 1929 former church, 10:00–19:00, <b>closed Wed</b> (open Fri). Good rain backup.','Freundlieb Kitano Kobe'],
      ]},
      {type:'see', title:'Arima Onsen village', items:[
        ['','One of Japan\'s three oldest hot springs (~1,300 yrs). Two waters: <b>Kinsen</b> (gold — iron/salt, reddish-brown) &amp; <b>Ginsen</b> (silver — clear, carbonated)'],
        ['','Public baths (a fun extra even with the ryokan\'s own): <b>Kin no Yu</b> — gold spring, <b>¥650 weekday</b> (¥800 wknd/hol), 8:00–22:00 (last 21:30), closed 2nd &amp; 4th Tue · <b>Gin no Yu</b> — silver, <b>¥550 weekday</b> (¥700), 9:00–21:00 (last 20:30), closed 1st &amp; 3rd Tue · combo ~¥1,200. <b>Fri Jun 5 = weekday rate, both open.</b> Free footbath outside Kin no Yu.','Kin no Yu Arima Onsen'],
        ['','<b>Taiko no Yu</b> (Arima View Hotel) — big day-spa with both waters + sauna, ¥2,750 weekday (¥2,970 wknd), 10:00–22:00. Note: the 13yo likely pays adult, 11yo elementary-child rate — confirm on arrival.','Taiko no Yu Arima Onsen'],
        ['','Stroll Yumotozaka &amp; Tansan-zaka slopes · Onsen-ji Temple · Nene-bashi bridge · <b>Toys &amp; Automata Museum</b> (10:00–17:30, adult ¥800 / child ¥500; 5F hands-on play space — great for the 11yo; closures irregular, verify)','Arima Toys and Automata Museum'],
        ['','Specialties: <b>tansan senbei</b> (carbonated crackers), <b>Arima cider</b>, onsen manju. The <b>Arima Tansanriki</b> shop sells novelty ciders (gyoza, curry-bread!) — fun with kids'],
      ]},
      {type:'eat', title:'At Arima Gyoen', items:[
        ['','Kobe beef multi-course <b>kaiseki dinner + traditional breakfast included</b> — reconfirm the dinner plan is on the booking (it\'s the whole point of the ryokan night)','Arima Gyoen Ryokan Kobe'],
        ['','Soak in both the Kinsen &amp; Ginsen baths · walk the village after dinner'],
      ]},
      {type:'callout', items:[['♨️','<b>First-time onsen tips:</b> wash &amp; rinse thoroughly at the seated showers before getting in · no swimwear · tie long hair up · small towel stays out of the water (rest it on your head) · no swimming/diving. <b>Tattoos</b> are usually not allowed in public baths — use the ryokan\'s private/family bath or cover with patches. <b>Baths are gender-separated</b> (not mixed): both boys are past the mixed-bath age, so <b>both go to the men\'s side with Dad, Mum takes the women\'s.</b>']]},

      {type:'logistics', title:'Good to know', items:[
        ['','Check out Arima by <b>10am</b> · Kyoto Airbnb check-in <b>3pm</b>. The 11:30 bus lands you at Kyoto Station at <b>12:45</b> — about 2 hrs to fill before check-in, so do a light afternoon first and check in after.'],

        ['','<b>Kyoto Station coin lockers:</b> ¥300 (S) / ¥500 (M) / ¥700 (L) / ¥1,000 (XL), but they fill on weekend mornings. Backup: <b>Crosta Kyoto</b> staffed storage by the central underground gate (~¥420/bag/day, 08:00–20:00) — it also delivers bags to a hotel same-day if you drop them by 14:00.'],
        ['','<b>Reconfirm the 11:30 bus the week before.</b> The Keihan route page shows a partial-suspension banner, though the live timetable still lists your 11:30 Saturday departure. Reservation line 075-661-8200 (09:00–19:00).'],
        ['','<b>If you miss the bus:</b> Shintetsu/bus down to Sannomiya → JR Special Rapid to Kyoto — ~90 min total, ~¥1,760 (Arima→Sannomiya ~¥680 + Sannomiya→Kyoto ¥1,080). Fastest: Shinkansen Shin-Kobe→Kyoto ~30 min, ~¥2,870 (unreserved).'],

      {type:'options', title:'Afternoon in Kyoto', items:[
        {tag:'Option A', name:'Fushimi Inari + Nishiki', rec:true, points:[
          ['<b>Nishiki Market</b> ("Kyoto’s Kitchen") — yuba, matcha soft serve, fresh mochi, pickles. Saturday is fully open (~9:00–17:00, stalls vary) but busy; ~15 min from Kyoto Station (Karasuma subway to Shijo + short walk).','Nishiki Market Kyoto'],
          ['<b>Fushimi Inari Taisha</b> — thousands of orange torii gates; free, open 24h. From Kyoto Station take the JR Nara Line <b>Local (普通)</b> 2 stops to JR Inari, ~5 min / ¥150 — <i>Rapid trains don’t stop at Inari</i>.','Fushimi Inari Taisha'],
          'Lower loop up to the <b>Yotsutsuji</b> viewpoint is an easy 30–45 min round trip (a good turnaround for the boys); full summit loop 2–3 hr. Fox statues everywhere — kids love them.',
          'Saturday 11am–3pm is peak crowds at the lower torii; arriving <b>late afternoon (~4pm)</b> is thinner, cooler, and the gates photograph beautifully near dusk.',
        ], sched:[
          ['~13:00','Drop bags (Airbnb or Kyoto Sta lockers) · quick lunch near the station','Kyoto Station'],
          ['~13:45','Subway to <b>Nishiki Market</b> — graze lunch &amp; snacks down the arcade','Nishiki Market Kyoto'],
          ['~15:30','Back to Kyoto Sta, JR Local to <b>JR Inari</b>','Fushimi Inari Taisha'],
          ['~16:00','<b>Fushimi Inari</b> — walk the lower torii loop to Yotsutsuji as crowds thin','Fushimi Inari Taisha'],
          ['~17:30','Train to <b>Gion / Higashiyama</b> for dinner','Gion Kyoto'],
        ]},
        {tag:'Option B', name:'Gion + Philosopher\'s Path', points:[
          ['Walk <b>Hanamikoji St</b> in Gion — wooden machiya townhouses, a possible geiko/maiko sighting late afternoon. <i>Note:</i> photography is banned in the private side alleys (fines apply) — keep to the main lane.','Hanamikoji Street Gion Kyoto'],
          ['<b>Philosopher’s Path</b> — peaceful, flat 2 km tree-lined canal walk; easy for kids (free, open anytime).','Philosophers Path Kyoto'],
          ['<b>Nanzenji</b> — huge Sanmon gate &amp; the brick Suirokaku aqueduct (free to wander); paid halls 08:40–17:00, ¥600 adult / ¥400 kids.','Nanzenji Temple Kyoto'],
        ], sched:[
          ['~14:00','Train/bus to <b>Gion Shijo</b>, stroll Hanamikoji','Hanamikoji Street Gion Kyoto'],
          ['~15:00','Up to <b>Nanzenji</b> — gate, grounds &amp; aqueduct','Nanzenji Temple Kyoto'],
          ['~16:00','<b>Philosopher’s Path</b> walk toward Ginkakuji','Philosophers Path Kyoto'],
          ['~17:30','Back to Gion / Higashiyama for dinner','Gion Kyoto'],
        ]},

      {type:'eat', title:'Evening in Gion/Higashiyama', items:[
        ['','<b>Gion Tanto</b> — okonomiyaki/teppanyaki cooked at your table, English menu, vegan options (~¥1,000–2,000pp). Fun &amp; casual for kids. <i>No reservations, ~20 seats — arrive near the 17:00 open; closed Thu (fine Sat).</i>','祇園たんと 京都市東山区清本町372'],
        ['','<b>Mimikou</b> — Kyoto curry udon near Yasaka Shrine (~¥1,000–1,300). Open Sat (closed Sun); afternoon break 15:00–17:00.','味味香 祇園本店 京都市東山区祇園町北側'],
        ['','<b>Kyou-no-Jidoriya Aki</b> — charcoal-grilled Kyoto <i>jidori</i> (local chicken) izakaya near Nishiki Market; dinner course from ~¥6,000pp (the priciest pick — reserve ahead if you want it).','京のじどり屋 晃 京都市中京区船屋町398'],
        ['','Dessert: <b>Gion Tsujiri</b> matcha parfait (10:30–21:00).','祇園辻利 祇園本店 京都市東山区四条通祇園町南側573-3'],
        ['','Coffee: <b>% Arabica Kyoto Higashiyama</b> — minimalist, scenic by Yasaka Pagoda (~9:00–18:00, often a queue).','% Arabica Kyoto Higashiyama 87-5 Hoshinocho Higashiyama-ku'],
      ]},
      {type:'tip', items:[
        ['','You’re based near Kyoto Station (Shimogyo-ku), so <b>Fushimi Inari is just a few minutes south</b> by JR Local — an easy first afternoon. Gion/Higashiyama is a short bus or train across town for the evening.'],
        ['','<b>Rain backup:</b> Fushimi’s torii tunnels &amp; the covered Nishiki arcade both work in light rain. Heavier downpour? Kyoto Station itself is a huge indoor complex — Ramen Koji (10F), the Isetan depachika, Porta underground mall &amp; Yodobashi nearby fill an afternoon dry.'],
      ]},

    blocks:[

        ['','<b>JR Saga-Arashiyama</b> from Kyoto Station (Sagano / San-in Line), ~15 min, <b>¥240</b>. On a June <b>Sunday</b> the grove &amp; temples fill fast — be at the <b>bamboo grove by 7:30–8:00</b>, before the tour buses.','Saga-Arashiyama Station Kyoto'],
        ['','<b>Arashiyama → Kinkakuji:</b> fastest is JR back to <b>Enmachi</b> (7 min, ¥190) then City Bus #204/205 (~¥230); or direct City Bus #11/#93 (~30–40 min, ¥230). <b>Kinkakuji → Ryoanji</b> is ~5 min on bus #59. Kyoto City Bus is a flat <b>¥230</b> a ride.'],
      ]},
      {type:'callout', items:[['📝','<b>Sort today:</b> everything here is <b>walk-up</b> — no temple needs a reservation. Carry <b>cash for the Monkey Park</b> (¥800/¥400, no cards). Want the riverside <b>Shoraian</b> yudofu? It\'s <b>phone-reservation only</b> (075-861-0123). Optional: book the <b>Sagano Romantic Train</b> ahead — it sells out in peak season.']]},

          ['14:00','<b>Nijo Castle</b> — Tokugawa palace, nightingale floors (8:45–17:00, last palace entry ~16:10; ¥800 + ¥500 Ninomaru Palace = ¥1,300). <b>Open Sun</b> (Tue closures only Jan/Jul/Aug/Dec)','Nijo Castle Kyoto'],

        ['','<b>Shoraian</b> — riverside tofu kaiseki in the hills above Togetsukyo; courses ¥3,800–5,800, Sun 11:00–20:00, <b>closed Wed</b>. <b>Phone reservation only</b> (075-861-0123) — no online booking, no guaranteed walk-in.','Shoraian Arashiyama Sagano Kyoto'],

        ['','<b>Arashiyama Yoshimura</b> — soba with a Togetsukyo Bridge view, ~¥1,000–3,000, 11:00–17:00. Best-value kid pick; queue forms ~1 hr before open.','Arashiyama Yoshimura soba Kyoto'],

const setVar = (el,a) => { el.style.setProperty('--c', AREA[a].c); el.style.setProperty('--c-soft', AREA[a].soft); };

// ---- google maps ----
const PIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>';
const PHONE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
const ROUTE = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>';
function mapURL(q){ return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q); }
// Chain a day's stops into one Google Maps transit-directions route.
// Uses d.route (explicit travel order) if present, else the d.maps[] queries in order.
function dayRouteURL(d){
  const stops = (d.route && d.route.length) ? d.route : (d.maps||[]).map(m=>m.q);
  if(stops.length<2) return null;
  const enc = encodeURIComponent;
  let url = 'https://www.google.com/maps/dir/?api=1&travelmode=transit'
    + '&origin='+enc(stops[0])
    + '&destination='+enc(stops[stops.length-1]);
  const mid = stops.slice(1,-1).map(enc).join('|');
  if(mid) url += '&waypoints='+mid;
  return url;
}
// Per-day weather strip: seasonal hint + live forecast link for that city/date.
function weatherHTML(d){
  if(!d.weather) return '';
  const w = d.weather;
  const url = 'https://www.google.com/search?q='+encodeURIComponent('weather '+(w.city||'')+' '+d.date);
  return `<div class="wx"><span class="ic">🌦️</span><span class="wx-t">${w.hint}</span><a class="wx-link" href="${url}" target="_blank" rel="noopener">Forecast ↗</a></div>`;
}
function placeQuery(p){
  let city={osaka:'Osaka',kobe:'Kobe',kyoto:'Kyoto',nara:'Nara'}[p.area];
  if(p.sub && p.sub.indexOf('Arima')>=0) city='Arima Onsen';
  return (p.loc ? p.nm+' '+p.loc : p.nm)+' '+city+' Japan';
}

// ---- status / today ----
const TRIP = DAYS.map(d=>d.date);
function todayKey(){
  const n = new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function dayDiff(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function renderStatus(){
  const tk = todayKey();
  const idx = TRIP.indexOf(tk);
  const st = $('#status');
  if(idx>=0){ st.innerHTML = '<b>Day '+(idx+1)+'</b>today'; return idx; }
  const toStart = dayDiff(tk, TRIP[0]);
  if(toStart>0){ st.innerHTML = '<b>'+toStart+'</b>day'+(toStart>1?'s':'')+' to go'; }
  else if(dayDiff(tk,TRIP[TRIP.length-1])>=0){ st.innerHTML='<b>•</b>in transit'; }
  else { st.innerHTML = 'おかえり<br>welcome home'; }
  return -1;
}

// ---- days ----
// Small inline "Map" link for a list item / option point (optional).
function mapLink(q){ return q?` <a class="li-map" href="${mapURL(q)}" target="_blank" rel="noopener">${PIN}Map</a>`:''; }
// Bullet list. Each item is ['', '<html>'] or ['', '<html>', 'map query'] (3rd → adds a Map link).
function liHTML(items){
  return items.map(it=>`<div class="li"><span class="bullet"></span><span>${it[1]}${mapLink(it[2])}</span></div>`).join('');
}
// Time-schedule rows: [['8:00','<html>'], …]. Optional 3rd element = map query.
function schedHTML(rows){
  return rows.map(r=>`<div class="sched"><div class="tm">${r[0]}</div><div class="ac">${r[1]}${mapLink(r[2])}</div></div>`).join('');
}
// An option point: a plain string, or ['<html>','map query'] to add a Map link.
function pointHTML(p){ const h=Array.isArray(p)?p[0]:p, q=Array.isArray(p)?p[1]:null;
  return `<div class="li"><span class="bullet"></span><span>${h}${mapLink(q)}</span></div>`; }
function blockHTML(b){
  const heads={logistics:['📍','Logistics'],eat:['🍜','Eat &amp; drink'],tip:['💡','Tips'],sched:['🕘','Schedule'],options:['🔀','Options'],see:['⛩️','See &amp; do'],callout:['','']};
  if(b.type==='callout'){
    return b.items.map(([ic,html])=>`<div class="callout"><span class="ic">${ic}</span><span>${html}</span></div>`).join('');
  }
  if(b.type==='booking'){
    const warn = b.warn?`<div class="tk-warn"><span class="ic">⚠️</span><span>${b.warn}</span></div>`:'';
    const cells = b.cells.map(c=>`<div class="tk-cell${c.full?' full':''}"><div class="k">${c.k}</div><div class="v">${c.v}${c.map?`<a class="tk-map" href="${mapURL(c.map)}" target="_blank" rel="noopener">${PIN}Open in Maps</a>`:''}</div></div>`).join('');
    return `<div class="ticket"><div class="tk-head"><span class="ic">🎫</span><span class="tt">${b.title}</span>${b.bk?`<span class="bk">${b.bk}</span>`:''}</div>${warn}<div class="tk-grid">${cells}</div></div>`;
  }
  let inner='';
  if(b.type==='sched'){
    inner = schedHTML(b.items);
  } else if(b.type==='options'){
    inner = b.items.map(o=>`
      <div class="opt${o.rec?' rec':''}">
        <div class="opt-h"><span class="opt-tag">${o.tag}</span><span class="opt-name">${o.name}</span>${o.rec?'<span class="opt-rec-badge">★ pick</span>':''}</div>
        ${(o.points||[]).map(pointHTML).join('')}
        ${o.sched?`<div class="opt-sched"><div class="opt-sched-h">Suggested timing</div>${schedHTML(o.sched)}</div>`:''}
      </div>`).join('');
  } else {
    inner = liHTML(b.items);
  }
  const [ic,defLabel]=heads[b.type]||['',''];
  const label = b.title || defLabel;
  const h = label?`<div class="block-h"><span class="ic">${ic}</span>${label}</div>`:'';
  return `<div class="block">${h}${inner}</div>`;
}
function navMapsHTML(d){
  if(!d.maps || !d.maps.length) return '';
  const chips = d.maps.map(m=>`<a class="navchip" href="${mapURL(m.q)}" target="_blank" rel="noopener">${PIN}${m.label}</a>`).join('');
  const route = dayRouteURL(d);
  const routeBtn = route?`<a class="navchip route" href="${route}" target="_blank" rel="noopener">${ROUTE}Day route</a>`:'';
  return `<div class="navmaps"><span class="nh">Navigate to</span>${chips}${routeBtn}</div>`;
}
function renderDays(todayIdx){
  const wrap=$('#days');
  wrap.innerHTML = DAYS.map((d,i)=>{
    const a=AREA[d.area];
    return `
    <article class="day-card${i===todayIdx?' today':''}" data-i="${i}" style="--c:${a.c};--c-soft:${a.soft}">
      <div class="stripe"></div>
      ${i===todayIdx?'<span class="today-flag">Today</span>':''}
      <div class="day-head">
        <div class="daynum"><span class="d">Day</span><span class="n">${d.n}</span></div>
        <div class="day-meta">
          <div class="dt">${d.wd}, ${new Date(d.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          <div class="ti">${d.title}</div>
          <span class="pl"><span class="dot"></span>${d.stay}</span>
        </div>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </div>
      <div class="day-body">${weatherHTML(d)}${d.blocks.map(blockHTML).join('')}${navMapsHTML(d)}</div>
    </article>`;
  }).join('');
  wrap.querySelectorAll('.day-card').forEach(card=>{
    card.querySelector('.day-head').addEventListener('click',()=>card.classList.toggle('open'));
  });
  // auto-open today
  if(todayIdx>=0) wrap.querySelectorAll('.day-card')[todayIdx].classList.add('open');
}

const CATS=[['all','All'],['eat','Eat'],['cafe','Cafe'],['book','Books'],];
let foodFilter='all';
function renderFilters(){
  $('#filters').innerHTML = CATS.map(([k,l])=>`<button class="fbtn${k===foodFilter?' on':''}" data-c="${k}">${l}</button>`).join('');
  $('#filters').querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{

function renderFood(){
  const list = PLACES.filter(p=>foodFilter==='all'||p.cat===foodFilter);
  if(!list.length){ $('#food').innerHTML='<div class="empty">No spots in this filter.</div>'; return; }
  // group by area then sub
  const order=['osaka','kobe','kyoto','nara'];
  let html='';
  order.forEach(ar=>{
    const inAr=list.filter(p=>p.area===ar);
    if(!inAr.length) return;
    const a=AREA[ar];
    const subs=[...new Set(inAr.map(p=>p.sub))];
    html+=`<div class="area-h" style="color:${a.c}"><span class="dot" style="background:${a.c}"></span>${a.name}</div>`;
    subs.forEach(sub=>{
      html+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:10px 0 7px">${sub}</div>`;
      inAr.filter(p=>p.sub===sub).forEach(p=>{
        const meta=[
          p.hrs?`<span>🕘 <b>${p.hrs}</b></span>`:'',
          p.loc?`<span>📍 <b>${p.loc}</b></span>`:'',
          `<a class="maplink" style="--c:${a.c}" href="${mapURL(placeQuery(p))}" target="_blank" rel="noopener">${PIN}Maps</a>`
        ].filter(Boolean).join('');
        html+=`<div class="place" style="--c:${a.c}">
          <div class="place-top"><div class="nm">${p.nm}</div>${p.pr?`<div class="pr">${p.pr}</div>`:''}</div>
          <span class="ty">${p.ty}</span>
          <div class="ds">${p.ds}</div>
          <div class="mt">${meta}</div>
        </div>`;
      });
    });
  });
  $('#food').innerHTML=html;
}

// ---- tabs ----
function initTabs(){
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    const v=t.dataset.v;
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    $('#view-'+v).classList.add('active');
    window.scrollTo({top:0,behavior:'instant'});
  }));
}

// ---- boot ----
const todayIdx = renderStatus();
renderDays(todayIdx);
renderRef();
renderFilters();
renderFood();
initTabs();
</script>
</body>
</html>
